<script>
    var PROXY_URL = '/api/proxy';
    var stateFipsMap = {};
    
    document.addEventListener('DOMContentLoaded', function() {
        var states = [
            {code:"01",name:"Alabama",abbr:"AL"},{code:"02",name:"Alaska",abbr:"AK"},{code:"04",name:"Arizona",abbr:"AZ"},{code:"05",name:"Arkansas",abbr:"AR"},{code:"06",name:"California",abbr:"CA"},{code:"08",name:"Colorado",abbr:"CO"},{code:"09",name:"Connecticut",abbr:"CT"},{code:"10",name:"Delaware",abbr:"DE"},{code:"11",name:"District of Columbia",abbr:"DC"},{code:"12",name:"Florida",abbr:"FL"},{code:"13",name:"Georgia",abbr:"GA"},{code:"15",name:"Hawaii",abbr:"HI"},{code:"16",name:"Idaho",abbr:"ID"},{code:"17",name:"Illinois",abbr:"IL"},{code:"18",name:"Indiana",abbr:"IN"},{code:"19",name:"Iowa",abbr:"IA"},{code:"20",name:"Kansas",abbr:"KS"},{code:"21",name:"Kentucky",abbr:"KY"},{code:"22",name:"Louisiana",abbr:"LA"},{code:"23",name:"Maine",abbr:"ME"},{code:"24",name:"Maryland",abbr:"MD"},{code:"25",name:"Massachusetts",abbr:"MA"},{code:"26",name:"Michigan",abbr:"MI"},{code:"27",name:"Minnesota",abbr:"MN"},{code:"28",name:"Mississippi",abbr:"MS"},{code:"29",name:"Missouri",abbr:"MO"},{code:"30",name:"Montana",abbr:"MT"},{code:"31",name:"Nebraska",abbr:"NE"},{code:"32",name:"Nevada",abbr:"NV"},{code:"33",name:"New Hampshire",abbr:"NH"},{code:"34",name:"New Jersey",abbr:"NJ"},{code:"35",name:"New Mexico",abbr:"NM"},{code:"36",name:"New York",abbr:"NY"},{code:"37",name:"North Carolina",abbr:"NC"},{code:"38",name:"North Dakota",abbr:"ND"},{code:"39",name:"Ohio",abbr:"OH"},{code:"40",name:"Oklahoma",abbr:"OK"},{code:"41",name:"Oregon",abbr:"OR"},{code:"42",name:"Pennsylvania",abbr:"PA"},{code:"44",name:"Rhode Island",abbr:"RI"},{code:"45",name:"South Carolina",abbr:"SC"},{code:"46",name:"South Dakota",abbr:"SD"},{code:"47",name:"Tennessee",abbr:"TN"},{code:"48",name:"Texas",abbr:"TX"},{code:"49",name:"Utah",abbr:"UT"},{code:"50",name:"Vermont",abbr:"VT"},{code:"51",name:"Virginia",abbr:"VA"},{code:"53",name:"Washington",abbr:"WA"},{code:"54",name:"West Virginia",abbr:"WV"},{code:"55",name:"Wisconsin",abbr:"WI"},{code:"56",name:"Wyoming",abbr:"WY"}
        ];
        
        var select = document.getElementById('state');
        states.forEach(function(s) {
            var opt = document.createElement('option');
            opt.value = s.code; opt.textContent = s.name + ' (' + s.abbr + ')';
            select.appendChild(opt); stateFipsMap[s.code] = s;
        });
        
        document.getElementById('searchForm').addEventListener('submit', handleSearch);
        
        document.querySelectorAll('.tab').forEach(function(tab) {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
                document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
                this.classList.add('active');
                document.getElementById(this.dataset.tab).classList.add('active');
            });
        });
    });
    
    async function fetchJson(url) {
        // Try direct request first
        try {
            var directResp = await fetch(url);
            if (directResp.ok) {
                return await directResp.json();
            }
        } catch(e) {
            console.log('Direct request failed, trying proxy...');
        }
        
        // Fall back to proxy
        var proxyResp = await fetch(PROXY_URL + '?url=' + encodeURIComponent(url));
        if (!proxyResp.ok) {
            var errorData = await proxyResp.json();
            throw new Error(errorData.error || 'HTTP ' + proxyResp.status);
        }
        return await proxyResp.json();
    }
    
    async function handleSearch(e) {
        e.preventDefault();
        var street = document.getElementById('street').value.trim();
        var city = document.getElementById('city').value.trim();
        var stateFips = document.getElementById('state').value;
        var searchBtn = document.getElementById('searchBtn');
        
        if (!street || !city || !stateFips) {
            showError('Please fill in all address fields.');
            return;
        }
        
        document.getElementById('resultsSection').style.display = 'none';
        document.getElementById('error').classList.remove('show');
        document.getElementById('loading').classList.add('show');
        searchBtn.disabled = true;
        
        try {
            // Step 1: Geocode
            var geoUrl = 'https://geocoding.geo.census.gov/geocoder/locations/address?street=' + 
                encodeURIComponent(street) + '&city=' + encodeURIComponent(city) + 
                '&state=' + stateFips + '&benchmark=Public_AR_Current&format=json';
            
            var geoData = await fetchJson(geoUrl);
            
            if (!geoData.result || !geoData.result.addressMatches || geoData.result.addressMatches.length === 0) {
                throw new Error('Address not found. Please check the address and try again.');
            }
            
            var match = geoData.result.addressMatches[0];
            var geos = match.geographies;
            
            var tractData = {
                stateFips: stateFips,
                stateName: stateFipsMap[stateFips] ? stateFipsMap[stateFips].name : 'Unknown',
                stateAbbr: stateFipsMap[stateFips] ? stateFipsMap[stateFips].abbr : 'Unknown',
                countyFips: null, countyName: 'Unknown', tractCode: null,
                msaCode: null, msaName: 'Not in a Metropolitan Statistical Area'
            };
            
            if (geos['Census Tracts'] && geos['Census Tracts'].length > 0) {
                tractData.tractCode = geos['Census Tracts'][0].TRACT;
                tractData.countyFips = geos['Census Tracts'][0].COUNTY;
                tractData.countyName = geos['Census Tracts'][0].COUNTYNAME || 'Unknown County';
            }
            
            if (geos['Metropolitan Statistical Areas'] && geos['Metropolitan Statistical Areas'].length > 0) {
                tractData.msaCode = geos['Metropolitan Statistical Areas'][0].MSA;
                tractData.msaName = geos['Metropolitan Statistical Areas'][0].NAME || 'Unknown MSA';
            }
            
            if (!tractData.tractCode || !tractData.countyFips) {
                throw new Error('Census tract not found for this address.');
            }
            
            // Step 2: Get ACS data
            var vars = 'B01003_001E,B02001_002E,B02001_003E,B02001_005E,B03002_012E,B19013_001E,B19019_001E,B19301_001E,B25001_001E,B25003_002E,B25003_003E,B25077_001E,B25064_001E,B17001_002E,B23025_005E,B23025_003E';
            var acsUrl = 'https://api.census.gov/data/2022/acs/acs5?get=' + vars + 
                '&for=tract:' + tractData.tractCode + 
                '&in=state:' + stateFips + '%20county:' + tractData.countyFips;
            
            var acsData = await fetchJson(acsUrl);
            
            if (!acsData || acsData.length < 2) {
                throw new Error('No demographic data available for this tract.');
            }
            
            var headers = acsData[0], values = acsData[1], result = {};
            headers.forEach(function(h, i) { result[h] = values[i]; });
            
            displayResults(tractData, result, match.coordinates);
            document.getElementById('resultsSection').style.display = 'block';
            document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth' });
            
        } catch (error) {
            console.error('Error:', error);
            showError('Unable to fetch data: ' + (error.message || 'Please try again later.'));
        } finally {
            document.getElementById('loading').classList.remove('show');
            searchBtn.disabled = false;
        }
    }
    
    function displayResults(td, d, coords) {
        function fmt(n) { return n && !isNaN(n) ? parseInt(n).toLocaleString() : 'N/A'; }
        function curr(n) { return n && !isNaN(n) ? '$' + parseInt(n).toLocaleString() : 'N/A'; }
        
        document.getElementById('overviewData').innerHTML = 
            '<div class="data-card"><h3>Census Tract</h3><div class="value">' + (td.tractCode || 'N/A') + '</div><div class="subtitle">2020 Census Tract</div></div>' +
            '<div class="data-card"><h3>County</h3><div class="value" style="font-size:20px;">' + td.countyName + '</div><div class="subtitle">FIPS: ' + (td.countyFips || 'N/A') + '</div></div>' +
            '<div class="data-card"><h3>MSA Code</h3><div class="value">' + (td.msaCode || 'N/A') + '</div><div class="subtitle">Metropolitan Statistical Area</div></div>' +
            '<div class="data-card"><h3>MSA Name</h3><div class="value" style="font-size:16px;">' + td.msaName + '</div></div>';
        
        document.getElementById('tractInfo').innerHTML = 
            '<h3>📍 Location Information</h3>' +
            '<p><strong>State:</strong> ' + td.stateName + ' (' + td.stateAbbr + ')</p>' +
            '<p><strong>Coordinates:</strong> ' + coords.x.toFixed(4) + ', ' + coords.y.toFixed(4) + '</p>' +
            '<p><strong>Total Population:</strong> ' + fmt(d['B01003_001E']) + '</p>' +
            '<p><strong>Data Year:</strong> 2022 ACS 5-Year Estimates</p>';
        
        var mhi = parseInt(d['B19013_001E']) || 0;
        var level = 'Low';
        if (mhi > 100000) level = 'Upper'; else if (mhi > 75000) level = 'Middle-Upper'; else if (mhi > 50000) level = 'Middle'; else if (mhi > 30000) level = 'Moderate';
        
        document.getElementById('incomeData').innerHTML = 
            '<div class="data-card"><h3>Median Household Income</h3><div class="value">' + curr(d['B19013_001E']) + '</div></div>' +
            '<div class="data-card"><h3>Median Family Income</h3><div class="value">' + curr(d['B19019_001E']) + '</div></div>' +
            '<div class="data-card"><h3>Per Capita Income</h3><div class="value">' + curr(d['B19301_001E']) + '</div></div>' +
            '<div class="data-card"><h3>Tract Income Level</h3><div class="value">' + level + '</div></div>';
        
        var tp = parseInt(d['B01003_001E']) || 0, wp = parseInt(d['B02001_002E']) || 0;
        var hp = parseInt(d['B03002_012E']) || 0, ap = parseInt(d['B02001_005E']) || 0;
        var mp = tp - wp, mpct = tp > 0 ? ((mp / tp) * 100).toFixed(1) : 0;
        
        document.getElementById('populationData').innerHTML = 
            '<div class="data-card"><h3>Total Population</h3><div class="value">' + fmt(tp) + '</div></div>' +
            '<div class="data-card"><h3>Minority Population</h3><div class="value">' + mpct + '%</div></div>' +
            '<div class="data-card"><h3>Hispanic or Latino</h3><div class="value">' + fmt(hp) + '</div></div>' +
            '<div class="data-card"><h3>Asian Population</h3><div class="value">' + fmt(ap) + '</div></div>';
        
        var tu = parseInt(d['B25001_001E']) || 0, oo = parseInt(d['B25003_002E']) || 0;
        var ro = parseInt(d['B25003_003E']) || 0;
        
        document.getElementById('housingData').innerHTML = 
            '<div class="data-card"><h3>Total Housing Units</h3><div class="value">' + fmt(tu) + '</div></div>' +
            '<div class="data-card"><h3>Owner Occupied</h3><div class="value">' + (tu>0?((oo/tu)*100).toFixed(1):0) + '%</div></div>' +
            '<div class="data-card"><h3>Renter Occupied</h3><div class="value">' + (tu>0?((ro/tu)*100).toFixed(1):0) + '%</div></div>' +
            '<div class="data-card"><h3>Median Home Value</h3><div class="value">' + curr(d['B25077_001E']) + '</div></div>' +
            '<div class="data-card"><h3>Median Gross Rent</h3><div class="value">' + curr(d['B25064_001E']) + '/mo</div></div>';
    }
    
    function showError(message) {
        var errorEl = document.getElementById('error');
        errorEl.textContent = '❌ ' + message;
        errorEl.classList.add('show');
    }
</script>
